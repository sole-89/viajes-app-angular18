<div class="row">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-header bg-success text-white">
        <h4>🌍 Reserva de Viaje</h4>
      </div>
      <div class="card-body">

        <div class="mb-3">
          <label class="form-label">Destino</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="destino">
        </div>

        <div class="mb-3">
          <label class="form-label">Fecha</label>
          <input
            type="date"
            class="form-control"
            [(ngModel)]="fecha">
        </div>

        <div class="mb-3">
          <label class="form-label">Cantidad de Personas</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="personas">
        </div>

        <button
          class="btn btn-success w-100"
          (click)="guardarReserva()">
          Guardar Reserva
        </button>
      </div>
    </div>
  </div>

  <div class="col-md-7">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4>📋 Reservas Realizadas</h4>
      </div>
      <div class="card-body">
        <table class="table table-striped" *ngIf="reservas.length > 0">
          <thead>
            <tr>
              <th>Destino</th>
              <th>Fecha</th>
              <th>Personas</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let reserva of reservas; let i = index">
              <td>{{ reserva.destino }}</td>
              <td>{{ reserva.fecha }}</td>
              <td>{{ reserva.personas }}</td>
              <td>
                <button
                  class="btn btn-danger btn-sm"
                  (click)="eliminarReserva(i)">
                  Eliminar
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <p class="text-muted" *ngIf="reservas.length === 0">
          No hay reservas registradas.
        </p>
      </div>
    </div>
  </div>
</div>
