<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-primary text-white text-center">
        <h3>✈️ Agencia de Viajes</h3>
      </div>
      <div class="card-body">
        <h4 class="text-center mb-4">Ingreso de Cliente</h4>

        <div class="mb-3">
          <label class="form-label">Nombre del Cliente</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="cliente"
            placeholder="Ingrese su nombre">
        </div>

        <button class="btn btn-success w-100" (click)="ingresar()">
          Ingresar
        </button>
      </div>
    </div>
  </div>
</div>
